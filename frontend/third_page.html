<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thirdpage - 모이새 약속 잡기</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1 id="meeting-title"></h1>
    </header>

    <!-- ▽▽ 회색 네모(입력 패널) 하나 안에서 모드 전환 & 확실성 선택 ▽▽ -->
    <section class="input-section" id="inputPanel">
      <!-- 공통: 이름 입력 -->
      <input type="text" id="name" placeholder="이름을 입력하세요" />

      <!-- 공통: 입력 방식 + 확실성 -->
      <div class="panel-header">
        <div class="segmented" role="tablist" aria-label="입력 방식">
          <button id="segDrop" class="seg active" type="button" role="tab" aria-selected="true">드롭박스</button>
          <button id="segDrag" class="seg" type="button" role="tab" aria-selected="false">드래그</button>
        </div>
        <div class="certainty-inline" aria-label="확실성 선택">
          <label><input type="radio" name="inlineCertainty" value="definite" checked> 확실함</label>
          <label><input type="radio" name="inlineCertainty" value="maybe"> 가능성 있음</label>
        </div>
      </div>

      <!-- 드롭박스 모드 -->
      <div id="dropdownContent" class="panel-body">
        <form id="availabilityForm">
          <div class="time-picker-inline">
            <label for="startHour">시작 시간:</label>
            <div class="time-select-group">
              <select id="startHour" required></select> :
              <select id="startMinute" required></select>
            </div>
          </div>

          <div class="time-picker-inline">
            <label for="endHour">종료 시간:</label>
            <div class="time-select-group">
              <select id="endHour" required></select> :
              <select id="endMinute" required></select>
            </div>
          </div>

          <!-- 날짜 선택(드롭박스 모드만) -->
          <select id="date" required></select>

          <!-- 확실성 select는 삭제됨(라디오만 사용) -->

          <button type="submit">시간 등록</button>
        </form>
      </div>

      <!-- 드래그 모드: 날짜 선택 드롭다운 없음 -->
      <div id="dragContent" class="panel-body hidden">
        <p class="drag-row hint">시간표에서 원하는 날짜 칼럼을 드래그하면 칸이 켜집니다(30분 단위, 다시 드래그하면 해제).</p>
        <div class="drag-actions">
          <button id="dragClear" type="button">선택 지우기</button>
          <button id="dragSave" type="button">드래그 선택 저장</button>
        </div>
      </div>

      <!-- 공통: 결과 화면 버튼 -->
      <button id="goResultBtn" style="margin-top:.6rem;">결과 화면 열기</button>
    </section>
    <!-- △△ 회색 네모(입력 패널) 끝 △△ -->

    <!-- 의견 메모장 (왼쪽 하단 고정) -->
    <section class="memo-section"
            style="position:fixed; bottom:1rem; left:1rem;
                    width:280px; padding:1rem; background:#fff5e1;
                    border:2px solid #a7904d; border-radius:12px;
                    box-shadow:0 2px 6px rgba(0,0,0,0.15);
                    z-index:1000;">
      <h3 style="margin-top:0;">📌 의견 메모</h3>
      <textarea id="memoInput" placeholder="약속에 대해 자유롭게 의견을 남겨주세요..."
                style="width:100%; height:80px; margin-bottom:0.5rem;
                      padding:0.5rem; border-radius:8px; border:1px solid #ccc;"></textarea>
      <button id="saveMemoBtn"
              style="background-color:#a7904d; color:white;
                    padding:0.5rem 1rem; border:none; border-radius:8px;
                    cursor:pointer; margin-bottom:0.5rem;">메모 저장</button>
      <ul id="memoList"
          style="list-style:none; padding:0; max-height:150px;
                overflow-y:auto; font-size:0.9rem;">
      </ul>
    </section>

    <!-- ▼ 스케줄 영역: JS가 동적 생성 -->
    <section class="schedule"></section>

    <!-- 고정 표시 패널 -->
    <section id="meeting-info"
             style="position:fixed; bottom:1rem; right:1rem;
                    width:280px; padding:1rem; background:#fff;
                    border:1px solid #ccc; border-radius:8px;
                    box-shadow:0 2px 6px rgba(0,0,0,0.15);
                    z-index:1000;">
      <h2 id="meeting-name" style="margin-bottom:0.5rem;"></h2>
      <p id="meeting-location" style="margin-bottom:0.5rem;"></p>
      <a id="meeting-link" href="#" target="_blank"></a>
    </section>
  </div>

  <!-- Firebase SDK 및 설정 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCiVW_fvG5hXmt_6aMeDRwXVU19ByRO1iA",
      authDomain: "moysay-d2606.firebaseapp.com",
      databaseURL: "https://moysay-d2606-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "moysay-d2606",
      storageBucket: "moysay-d2606.appspot.com",
      messagingSenderId: "843998694219",
      appId: "1:843998694219:web:219ec5ebdbf835c08076ce"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    //const memoRef = ref(db, 'memos');
    // roomName을 localStorage에서 읽어와서 방별 경로로 저장/조회
    const meetingInfo = JSON.parse(localStorage.getItem('meetingInfo')) || {};
    const roomName = meetingInfo.name || 'default-room';
    const memoRef = ref(db, `rooms/${roomName}/memos`);

    // DOM이 준비되면 실행
    window.addEventListener("DOMContentLoaded", () => {
      // 메모 저장
      document.getElementById("saveMemoBtn").addEventListener("click", () => {
        const content = document.getElementById("memoInput").value.trim();
        const name = document.getElementById("name")?.value || "익명";
        if (content === "") return;

        push(memoRef, {
          name,
          content,
          timestamp: new Date().toISOString()
        });

        document.getElementById("memoInput").value = "";
      });

      // 메모 불러오기
      onValue(memoRef, (snapshot) => {
        const memoList = document.getElementById("memoList");
        memoList.innerHTML = "";

        snapshot.forEach((child) => {
          const { name, content } = child.val();
          const li = document.createElement("li");
          li.textContent = `[${name}] ${content}`;
          memoList.appendChild(li);
        });
      });
    });

    // 다른 스크립트에서도 쓸 수 있게 등록
    window.firebaseDB = db;
    window.firebaseRef = ref;
    window.firebasePush = push;
    window.firebaseOnValue = onValue;
  </script>

 <!-- ★ 추가: 2페이지에서 저장한 meetingInfo를 패널/헤더에 뿌리기 -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      let info = {};
      try { info = JSON.parse(localStorage.getItem('meetingInfo')) || {}; }
      catch { info = {}; }

      const name = info.name || '';
      const location = info.location || '';
      const link = info.link || '';

      // 상단 제목
      const titleEl = document.getElementById('meeting-title');
      if (titleEl) titleEl.textContent = name ? `약속: ${name}` : '약속';

      // 오른쪽 고정 패널
      const nameEl = document.getElementById('meeting-name');
      const locEl  = document.getElementById('meeting-location');
      const linkEl = document.getElementById('meeting-link');

      if (nameEl) nameEl.textContent = name || '이름 미정';
      if (locEl)  locEl.textContent  = location ? `장소: ${location}` : '장소 미정';

      if (linkEl) {
        if (link) {
          const normalized = /^https?:\/\//i.test(link) ? link : `https://${link}`;
          linkEl.textContent = '장소 링크 열기';
          linkEl.href = normalized;
          linkEl.style.display = '';
        } else {
          linkEl.textContent = '';
          linkEl.removeAttribute('href');
          linkEl.style.display = 'none';
        }
      }
    });
  </script>

  <!-- 기존 스크립트: Firebase 연동 및 UI 업데이트 포함 -->
  <script src="script.js"></script>

  <!-- 겹치는 사람 패널 (오른쪽 컨트롤 아래나 근처에 배치) -->
  <aside id="overlap-panel" class="overlap-panel">
    <h3>겹치는 사람</h3>
    <div class="op-time">—</div>
    <div class="op-group">
      <span class="op-badge op-sure">확실함</span>
      <ul id="op-list-sure"></ul>
    </div>
    <div class="op-group">
      <span class="op-badge op-maybe">가능성</span>
      <ul id="op-list-maybe"></ul>
    </div>
  </aside>
</body>
</html>
